name: Garda Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  garda:
    runs-on: ubuntu-latest
    steps:
      # Generate a short-lived GitHub App token so comments appear as
      # garda-code[bot] instead of github-actions[bot].
      # See docs/setup-github-app.md to create the app and set these secrets.
      - name: Create Garda GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GARDA_APP_CLIENT_ID }}
          private-key: ${{ secrets.GARDA_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write
          permission-issues: write
          permission-actions: read

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: neosantara-xyz/garda-code-action@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@garda"
          mode: "auto"
          review_language: "id"
          # Optional: override the model (defaults to gemini-3.5-flash)
          # model: "gemini-3.5-flash"
          # Optional: fallback model(s) if the primary is unavailable
          # fallback_model: "claude-opus-4-6, claude-sonnet-4-6"
        env:
          NEOSANTARA_API_KEY: ${{ secrets.NEOSANTARA_API_KEY }}
