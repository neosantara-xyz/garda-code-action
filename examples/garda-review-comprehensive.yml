name: Garda Comprehensive Review

# Automatic, in-depth review on every pull request. Garda reviews on open,
# push, reopen, and ready-for-review with no extra prompting. Use
# custom_instructions to steer the review toward your team's priorities.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  garda-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: neosantara-xyz/garda-code-action@v1
        with:
          trigger_phrase: "@garda"
          mode: "review"
          review_language: "en"
          # Only surface medium+ severity inline comments to reduce noise
          min_inline_severity: "medium"
          custom_instructions: |
            Perform a comprehensive code review focused on:
            1. Code Quality — clean code, error handling, edge cases, readability
            2. Security — input validation, authn/authz, injection risks
            3. Performance — bottlenecks, inefficient queries, resource leaks
            4. Testing — adequate coverage and meaningful edge-case tests
            5. Documentation — code comments and README/API accuracy

            Use inline comments for specific line-level issues and provide
            suggestion blocks for concrete fixes. Use top-level comments for
            general observations or praise.
        env:
          NEOSANTARA_API_KEY: ${{ secrets.NEOSANTARA_API_KEY }}
