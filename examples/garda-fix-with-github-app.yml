name: Garda Fix

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  garda-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Create Garda GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GARDA_APP_CLIENT_ID }}
          private-key: ${{ secrets.GARDA_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-actions: read

      - name: Get Garda bot user id
        id: bot-user
        run: echo "id=$(gh api '/users/${{ steps.app-token.outputs.app-slug }}[bot]' --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: neosantara-xyz/garda-code-action@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@garda"
          mode: "fix"
          allow_fix: "true"
          branch_prefix: "garda/"
          branch_name_template: "{{prefix}}{{entityType}}-{{entityNumber}}-{{description}}"
          commit_strategy: "github-api"
          enable_mcp_compat: "true"
          bot_id: ${{ steps.bot-user.outputs.id }}
          bot_name: ${{ steps.app-token.outputs.app-slug }}[bot]
          model: "grok-code-fast"
          review_language: "id"
        env:
          NEOSANTARA_API_KEY: ${{ secrets.NEOSANTARA_API_KEY }}
