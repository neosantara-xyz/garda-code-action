name: Garda Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  garda:
    runs-on: ubuntu-latest
    steps:
      - name: Create Garda GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GARDA_APP_CLIENT_ID }}
          private-key: ${{ secrets.GARDA_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write
          permission-issues: write
          permission-actions: read

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: neosantara-xyz/garda-code-action@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@garda"
          mode: "auto"
          model: "grok-code-fast"
          review_language: "id"
          inline_comments: "true"
          inline_classifier_mode: "model"
          min_inline_severity: "low"
          enable_mcp_compat: "true"
        env:
          NEOSANTARA_API_KEY: ${{ secrets.NEOSANTARA_API_KEY }}
