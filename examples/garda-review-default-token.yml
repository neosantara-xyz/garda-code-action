name: Garda Review (default token)

# Simplest setup: no GitHub App required. Garda runs with the built-in
# GITHUB_TOKEN, so comments appear as github-actions[bot]. For a branded
# bot identity (garda-code[bot]), use garda-review.yml instead.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  garda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: neosantara-xyz/garda-code-action@v1
        with:
          trigger_phrase: "@garda"
          mode: "auto"
          review_language: "id"
        env:
          NEOSANTARA_API_KEY: ${{ secrets.NEOSANTARA_API_KEY }}
