name: Garda Read-only Review (Locked Tools)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  garda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: neosantara/garda-code-action@v1
        with:
          trigger_phrase: "@garda"
          mode: "review"
          allowed_tools: |
            repo_get_changed_files
            repo_get_diff
            repo_read_file
            repo_grep
            repo_list_files
            github_get_ci_status
            github_buffer_inline_comment
            github_update_tracking_comment
            mcp__repo__read_file
            mcp__github_inline_comment__create_inline_comment
          disallowed_tools: |
            repo_write_file
            git_commit_files
            mcp__github_file_ops__commit_files
          custom_instructions: |
            Prioritize correctness, security, and broken tests. Avoid style-only comments.
        env:
          NEOSANTARA_API_KEY: ${{ secrets.NEOSANTARA_API_KEY }}
