name: "Garda Code Action"
description: "Production-grade protective GitHub automation powered by Neosantara Responses API"
author: "Neosantara"
branding:
  icon: "at-sign"
  color: "blue"

inputs:
  trigger_phrase:
    description: "Trigger phrase for comments, review comments, issues, and PR bodies"
    required: false
    default: "@garda"
  assignee_trigger:
    description: "Assignee username that triggers the action, without @"
    required: false
    default: ""
  base_branch:
    description: "Base/source branch for issue fix branches. Defaults to repository default branch."
    required: false
    default: ""
  label_trigger:
    description: "Issue/PR label that triggers the action"
    required: false
    default: "garda"
  mode:
    description: "auto, review, ask, fix, security, ci-analysis, release-notes"
    required: false
    default: "auto"
  prompt:
    description: "Direct prompt for agent mode. If empty, the action extracts the request from the GitHub event."
    required: false
    default: ""
  model:
    description: "Neosantara model id"
    required: false
    default: "grok-code-fast"
  fallback_model:
    description: "Fallback Neosantara model id(s) if the primary model is unavailable (503/404/422). Accepts multiple models separated by comma or newline; they are tried in order."
    required: false
    default: ""
  neosantara_base_url:
    description: "Neosantara OpenAI-compatible base URL"
    required: false
    default: "https://api.neosantara.xyz/v1"
  github_token:
    description: "GitHub token with repo, issue, pull request, and optional actions permissions"
    required: false
    default: ${{ github.token }}
  allowed_bots:
    description: "Comma-separated bot usernames allowed to trigger this action, or *"
    required: false
    default: ""
  allowed_non_write_users:
    description: "Comma-separated users allowed without write permission, or *. Use with care on public repos."
    required: false
    default: ""
  include_comments_by_actor:
    description: "Comma-separated actor usernames to include while building context. Supports *[bot]."
    required: false
    default: ""
  exclude_comments_by_actor:
    description: "Comma-separated actor usernames to exclude while building context. Supports *[bot]."
    required: false
    default: ""
  review_language:
    description: "Language used in the review and tracking comments"
    required: false
    default: "id"
  custom_instructions:
    description: "Trusted maintainer-supplied extra instructions appended to the Garda Code system prompt. Do not pass untrusted user/repo content here."
    required: false
    default: ""
  inline_comments:
    description: "Enable buffered inline PR review comments"
    required: false
    default: "true"
  classify_inline_comments:
    description: "Classify and filter buffered inline comments before posting. Heuristic in v0.x; safer than posting every tool test."
    required: false
    default: "true"
  batch_inline_comments:
    description: "Post inline comments as one PR review when possible, falling back to individual comments."
    required: false
    default: "true"
  inline_classifier_mode:
    description: "Inline comment classifier mode: model, heuristic, or off. Model mode uses Neosantara Responses API to reject low-signal/probe inline comments."
    required: false
    default: "model"
  inline_classifier_model:
    description: "Optional Neosantara model id for inline comment classification. Defaults to model."
    required: false
    default: ""
  min_inline_severity:
    description: "Minimum severity for inline comments after classification: low, medium, or high."
    required: false
    default: "low"
  include_fix_links:
    description: "Include a compact fix request hint on inline comments."
    required: false
    default: "true"
  track_progress:
    description: "Create and update one sticky progress comment"
    required: false
    default: "true"
  use_sticky_comment:
    description: "Reuse one Garda Code tracking comment when available"
    required: false
    default: "true"
  allow_fix:
    description: "Allow file writes and commits. Defaults to false."
    required: false
    default: "false"
  commit_message:
    description: "Commit message used by fix mode when files are changed"
    required: false
    default: "chore: apply Garda Code changes"
  branch_prefix:
    description: "Branch prefix for issue fix mode branch creation"
    required: false
    default: "garda/"
  branch_name_template:
    description: "Branch template for issue fix mode. Supports {{prefix}}, {{entityType}}, {{entityNumber}}, {{description}}, {{timestamp}}, {{sha}}, {{label}}"
    required: false
    default: "{{prefix}}{{entityType}}-{{entityNumber}}-{{description}}"
  bot_id:
    description: "GitHub App bot user ID used for git commits, e.g. 12345678. Optional for review-only mode."
    required: false
    default: ""
  bot_name:
    description: "GitHub App bot username used for git commits, e.g. garda-code[bot] or neosantara-ai[bot]."
    required: false
    default: "garda-code[bot]"
  commit_strategy:
    description: "Commit strategy for fix mode: git or github-api. github-api avoids git push auth state and is closer to GitHub App file-ops behavior."
    required: false
    default: "git"
  use_commit_signing:
    description: "Compatibility flag. When true and commit_strategy is not set, uses github-api commit strategy. Real cryptographic signing still depends on GitHub/App configuration."
    required: false
    default: "false"
  ssh_signing_key:
    description: "SSH private key for signing commits. When provided, git will be configured to use SSH signing. Takes precedence over use_commit_signing."
    required: false
    default: ""
  enable_mcp_compat:
    description: "Expose MCP-style tool aliases such as mcp__github_comment__update_garda_comment and mcp__github_file_ops__commit_files."
    required: false
    default: "true"
  allowed_tools:
    description: "Optional comma/newline-separated exact or glob tool allowlist. Empty means all safe tools for the current mode."
    required: false
    default: ""
  disallowed_tools:
    description: "Optional comma/newline-separated exact or glob tool denylist applied after allowed_tools. Use this to remove risky tools from a workflow."
    required: false
    default: ""
  use_github_app_token_exchange:
    description: "Use GitHub Actions OIDC to request a GitHub App installation token from a hosted token exchange service."
    required: false
    default: "false"
  github_app_token_exchange_url:
    description: "Hosted token exchange endpoint. Requires use_github_app_token_exchange=true and id-token: write permission."
    required: false
    default: ""
  github_app_token_exchange_audience:
    description: "OIDC audience used when requesting a token for the hosted GitHub App token exchange."
    required: false
    default: "garda-code-action"
  max_steps:
    description: "Maximum Responses API tool loop steps"
    required: false
    default: "40"
  max_diff_chars:
    description: "Maximum diff context size sent to the model"
    required: false
    default: "80000"
  max_file_chars:
    description: "Maximum file content returned by read_file"
    required: false
    default: "30000"
  max_inline_comments:
    description: "Maximum inline comments to post"
    required: false
    default: "20"
  max_tool_calls_per_step:
    description: "Maximum model-requested tool calls executed in one Responses API step"
    required: false
    default: "8"
  max_repeated_tool_calls:
    description: "Maximum repeated identical tool calls before the runner returns a guard error"
    required: false
    default: "3"
  retry_max_attempts:
    description: "Maximum retry attempts for transient Neosantara Responses API errors"
    required: false
    default: "3"
  max_runtime_seconds:
    description: "Maximum wall-clock seconds for the Responses API tool loop before returning a guarded stop result."
    required: false
    default: "900"

  include_image_context:
    description: "Download GitHub user-attachment images from the trigger/context and pass them to Neosantara Responses API when supported."
    required: false
    default: "true"
  max_comment_images:
    description: "Maximum GitHub user-attachment images to include as multimodal context."
    required: false
    default: "5"
  max_image_bytes:
    description: "Maximum bytes per downloaded comment image."
    required: false
    default: "1572864"
  cleanup_empty_branch:
    description: "Delete Garda-created issue fix branches when no changes were committed."
    required: false
    default: "true"
  restore_trusted_config:
    description: "Restore sensitive Garda/Neosantara/MCP/git config from the PR base branch before running on PRs"
    required: false
    default: "true"
  ignore:
    description: "Newline or comma separated ignore patterns"
    required: false
    default: |
      .git/**
      .garda-pr/**
      .neo-pr/**
      .env
      .env.*
      *.pem
      *.key
      id_rsa
      id_ed25519
      .npmrc
      .pypirc
      .netrc
      node_modules/**
      dist/**
      build/**
      coverage/**
      *.lock
      pnpm-lock.yaml
      package-lock.json
      yarn.lock
  dry_run:
    description: "Run without posting comments, inline comments, or commits"
    required: false
    default: "false"
  show_full_output:
    description: "Print full model/tool output. Warning: may expose sensitive data in logs."
    required: false
    default: "false"
  display_report:
    description: "Write model-authored content to GitHub Step Summary. Disabled by default for untrusted PR/comment content."
    required: false
    default: "false"

outputs:
  conclusion:
    description: "success, skipped, failed"
  summary:
    description: "Final Garda Code summary"
  findings_count:
    description: "Number of validated findings"
  comment_url:
    description: "Tracking comment URL"
  response_id:
    description: "Final Neosantara Responses API response id"
  usage_json:
    description: "Usage metadata when available"
  execution_file:
    description: "Path to the Garda Code execution transcript JSON file"
  branch_name:
    description: "Branch created or used by Garda Code fix mode"
  session_id:
    description: "Final Neosantara Responses API response id for continuing/debugging"
  github_token:
    description: "The GitHub token used by the action"

runs:
  using: "node24"
  main: "dist/index.js"
