name: Garda Live Test

# Dogfooding workflow: Garda reviews its own pull requests.
# Uses the default token resolution (auto): tries the hosted token exchange
# when OIDC is available and the Garda app is installed, otherwise falls back
# to GITHUB_TOKEN so reviews still run.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  garda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: neosantara-xyz/garda-code-action@main
        with:
          trigger_phrase: "@garda"
          mode: "auto"
          review_language: "id"
          allow_fix: "true"
        env:
          NEOSANTARA_API_KEY: ${{ secrets.NEOSANTARA_API_KEY }}
